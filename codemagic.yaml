workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - expo_credentials
      node: latest
      xcode: 16.2
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        CURRENT_PROJECT_VERSION: "58"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates --certificate ci_certs/dist-cert.p12 --certificate-password "XPc9rEcZ4FEVuThu0TdVxQ=="
          xcode-project use-profiles --project ios/TheScene.xcodeproj --profile ci_certs/profile.mobileprovision
      - name: Build iOS
        script: |
          mkdir -p /tmp/xcodebuild_logs
          set -o pipefail
          xcodebuild \
            -workspace "ios/TheScene.xcworkspace" \
            -scheme "TheScene" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/TheScene.xcarchive" \
            archive 2>&1 | tee /tmp/xcodebuild_logs/archive.log
      - name: Export IPA
        script: |
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/TheScene.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "ios/ExportOptions.plist" 2>&1 | tee /tmp/xcodebuild_logs/export.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
