workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - expo_credentials
      node: latest
      xcode: 16.2
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        CURRENT_PROJECT_VERSION: "59"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios

          # Fix Push Notifications entitlement mismatch for Release build
          ENTITLEMENTS_FILE="ios/TheScene/TheScene.entitlements"
          if [ -f "$ENTITLEMENTS_FILE" ]; then
            /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENTITLEMENTS_FILE" || true
          fi

          echo "=== Entitlements file content after prebuild ==="
          cat "$ENTITLEMENTS_FILE" || echo "Entitlements file not found at $ENTITLEMENTS_FILE"
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          set -x
          keychain initialize

          echo "=== Adding distribution certificate to keychain ==="
          keychain add-certificates --certificate ci_certs/dist-cert.p12 --certificate-password "XPc9rEcZ4FEVuThu0TdVxQ=="

          echo "=== Listing keychain certificates after import ==="
          security find-identity -v -p codesigning

          echo "=== Installing provisioning profile with correct UUID filename ==="
          PROFILE_UUID=$(security cms -D -i ci_certs/profile.mobileprovision | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          echo "Profile UUID: $PROFILE_UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp ci_certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "=== Profile entitlements ==="
          security cms -D -i ci_certs/profile.mobileprovision | plutil -extract Entitlements xml1 -o - -

          # Export UUID for use in build step
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build iOS
        script: |
          echo "=== Using Profile UUID: $PROFILE_UUID ==="
          ARCHIVE_PATH="build/ios/xcarchive/TheScene.xcarchive"
          mkdir -p build/ios/ipa/

          echo "=== Archiving ==="
          xcodebuild \
            -workspace "ios/TheScene.xcworkspace" \
            -scheme "TheScene" \
            -config "Release" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Generating ExportOptions.plist ==="
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.vindi.thescene</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "=== Exporting IPA ==="
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "build/ios/ipa/"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
