workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - expo_credentials
      node: latest
      xcode: 16.2
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        CURRENT_PROJECT_VERSION: "58"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios
          
          # Bypass Push Notifications requirement to fix profile mismatch
          ENTITLEMENTS_FILE="ios/TheScene/TheScene.entitlements"
          if [ -f "$ENTITLEMENTS_FILE" ]; then
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" "$ENTITLEMENTS_FILE" || true
          fi
          sed -i '' '/com.apple.Push = {/,/};/d' "ios/TheScene.xcodeproj/project.pbxproj" || true
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.vindi.thescene --type IOS_APP_STORE --create
          xcode-project use-profiles --project ios/TheScene.xcodeproj
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/TheScene.xcworkspace" \
            --scheme "TheScene" \
            --config "Release"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
