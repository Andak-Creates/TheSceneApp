workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - expo_credentials
      node: latest
      xcode: 26.0
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        CURRENT_PROJECT_VERSION: "59"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios

          # Fix Push Notifications entitlement mismatch for Release build
          ENTITLEMENTS_FILE="ios/TheScene/TheScene.entitlements"
          if [ -f "$ENTITLEMENTS_FILE" ]; then
            /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENTITLEMENTS_FILE" || true
          fi

          echo "=== Entitlements file content after prebuild ==="
          cat "$ENTITLEMENTS_FILE" || echo "Entitlements file not found at $ENTITLEMENTS_FILE"

          # Programmatically configure manual code signing in Xcode project
          python3 -c '
          import re
          path = "ios/TheScene.xcodeproj/project.pbxproj"
          with open(path, "r") as f:
              content = f.read()

          content = content.replace("ProvisioningStyle = Automatic;", "ProvisioningStyle = Manual;")

          pattern = re.compile(r"(buildSettings = \{)(.*?)(\t*?\};)", re.DOTALL)
          def replace(m):
              prefix, body, suffix = m.group(1), m.group(2), m.group(3)
              for key in ["CODE_SIGN_STYLE", "DEVELOPMENT_TEAM", "PROVISIONING_PROFILE", "PROVISIONING_PROFILE_SPECIFIER", "CODE_SIGN_IDENTITY"]:
                  body = re.sub(r"^\t*" + key + r"\s*=.*?\n", "", body, flags=re.MULTILINE)
              body = body.rstrip()
              new_settings = (
                  "\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n"
                  "\t\t\t\tDEVELOPMENT_TEAM = 22WCSLKPL6;\n"
                  "\t\t\t\tPROVISIONING_PROFILE = \"6141b0b2-c852-4ae2-951c-4121106d6a93\";\n"
                  "\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"*[expo] com.vindi.thescene AppStore 2026-03-11T23:32:22.216Z\";\n"
                  "\t\t\t\tCODE_SIGN_IDENTITY = \"iPhone Distribution\";\n"
              )
              return prefix + body + new_settings + suffix
          
          content = pattern.sub(replace, content)
          with open(path, "w") as f:
              f.write(content)
          print("Successfully patched project.pbxproj to use manual signing!")
          '
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          set -x
          keychain initialize

          echo "=== Adding distribution certificate to keychain ==="
          keychain add-certificates --certificate ci_certs/dist-cert.p12 --certificate-password "XPc9rEcZ4FEVuThu0TdVxQ=="

          echo "=== Listing keychain certificates after import ==="
          security find-identity -v -p codesigning

          echo "=== Installing provisioning profile with correct UUID filename ==="
          security cms -D -i ci_certs/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          rm /tmp/profile.plist
          echo "Profile UUID: $PROFILE_UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp ci_certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "=== Installed provisioning profiles and their entitlements ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -e "$f" ] || continue
            echo "--- Profile: $f ---"
            security cms -D -i "$f" | plutil -extract Entitlements xml1 -o - -
          done

          echo "=== Profile entitlements ==="
          security cms -D -i ci_certs/profile.mobileprovision | plutil -extract Entitlements xml1 -o - -

          # Export UUID for use in build step
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build iOS
        script: |
          echo "=== Using Profile UUID: $PROFILE_UUID ==="
          ARCHIVE_PATH="build/ios/xcarchive/TheScene.xcarchive"
          mkdir -p build/ios/ipa/

          echo "=== Archiving ==="
          xcodebuild \
            -workspace "ios/TheScene.xcworkspace" \
            -scheme "TheScene" \
            -config "Release" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            > xcodebuild.log 2>&1 || {
              echo "=== BUILD FAILED ==="
              echo "=== Printing error / failure context ==="
              grep -in -C 5 "error:" xcodebuild.log || grep -in -C 5 "fail" xcodebuild.log || grep -in -C 5 "❌" xcodebuild.log || tail -n 200 xcodebuild.log
              exit 1
            }

          echo "=== Generating ExportOptions.plist ==="
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.vindi.thescene</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "=== Exporting IPA ==="
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "build/ios/ipa/" \
            > xcodebuild_export.log 2>&1 || {
              echo "=== EXPORT FAILED ==="
              echo "=== Printing last 200 lines of export log ==="
              tail -n 200 xcodebuild_export.log
              exit 1
            }

    artifacts:
      - build/ios/ipa/*.ipa
      - xcodebuild*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
