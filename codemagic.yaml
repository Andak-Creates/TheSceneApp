workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - expo_credentials
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        CURRENT_PROJECT_VERSION: "58"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          keychain initialize
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERT_PASSWORD
          xcode-project use-profiles --profile /tmp/profile.mobileprovision
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/TheScene.xcworkspace" \
            --scheme "TheScene"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
